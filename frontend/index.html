<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Country AI Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif;background: linear-gradient(180deg, #0f172a, #1e293b); color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 640px; padding: 40px 20px; }
  h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 8px; }
  p.sub { color: #94a3b8; margin-bottom: 32px; }
  .input-row { display: flex; gap: 10px; }
  input { flex: 1; padding: 14px 18px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 1rem; outline: none; }
  input:focus { border-color: #38bdf8; }
  button { padding: 14px 24px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .examples { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 6px 14px; background: #1e293b; border: 1px solid #334155; border-radius: 99px; cursor: pointer; font-size: 0.85rem; color: #94a3b8; }
  .chip:hover { border-color: #38bdf8; color: #38bdf8; }
  .result { margin-top: 28px; background: #1e293b; border-radius: 12px; padding: 24px; border-left: 4px solid #38bdf8; display: none; }
  .answer { font-size: 1.1rem; line-height: 1.7; color: #e2e8f0; }
  .meta { margin-top: 14px; font-size: 0.8rem; color: #64748b; }
  .error { border-left-color: #f87171; }
  .loading { text-align: center; padding: 20px; color: #94a3b8; display: none; }
  .bottom_info {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; padding: 20px; color: #3d5a82; width: 100%;}
</style>
</head>
<body>
<div class="container">
  <h1>🌍 AI Agent For Countrys Info</h1>
  <p class="sub">Ask any question related country.</p>
  <div class="input-row">
    <input id="q" type="text" placeholder="e.g. What is the population of Brazil?" />
    <button id="btn" onclick="ask()">Ask</button>
  </div>
  <div class="examples">
    <span class="chip" onclick="setQ(this)">Capital of Japan</span>
    <span class="chip" onclick="setQ(this)">Currency used in France</span>
    <span class="chip" onclick="setQ(this)">Population of India</span>
    <span class="chip" onclick="setQ(this)">Languages spoken in Switzerland</span>
    <span class="chip" onclick="setQ(this)">What is the area of Australia?</span>
  </div>
  <div class="loading" id="loading">⏳ Agent is thinking...</div>
  <div class="result" id="result">
    <div class="answer" id="answer"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>
<div class="bottom_info">Created by Aryan Rathore</div>
<script>
  function setQ(el) {
    document.getElementById('q').value = el.textContent;
    ask();
  }
  async function ask() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    const btn = document.getElementById('btn');
    btn.disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    try {
      const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:8000' 
        : 'https://country-agent-iqng.onrender.com';   

      const res = await fetch(`${API_URL}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      document.getElementById('answer').textContent = data.answer || data.detail;
      document.getElementById('meta').textContent =
        `Country: ${data.country_detected || 'N/A'} · Fields: ${(data.fields_requested || []).join(', ') || 'N/A'} · ${data.processing_time_ms}ms`;
      const r = document.getElementById('result');
      r.className = 'result' + (res.ok ? '' : ' error');
      r.style.display = 'block';
    } catch(e) {
      document.getElementById('answer').textContent = 'Could not connect to the agent server.';
      document.getElementById('result').className = 'result error';
      document.getElementById('result').style.display = 'block';
    }
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
  }
  document.getElementById('q').addEventListener('keydown', e => e.key === 'Enter' && ask());
</script>
</body>
</html>
